syntax = "proto3";
package orchestrator;

service OrchestratorService {
  rpc RegisterWorker(RegisterRequest) returns (RegisterResponse);
  rpc PostResult(PostResultRequest) returns (PostResultResponse);
  rpc UpdateRank(UpdateRankRequest) returns (UpdateRankResponse); // NEW: External rankers call this
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message RegisterRequest {
  string worker_id = 1;
  string backend_name = 2;
  string analysis_type = 3;
  bool is_validator = 4;
  bool is_ranker = 5; // NEW: Distinguish ranker plugins
}

message RegisterResponse {
  bool success = 1;
}

message HeartbeatRequest {
  string worker_id = 1;
  string status_message = 2;
}

message HeartbeatResponse {
  bool acknowledged = 1;
}

message PostResultRequest {
  string analysis_type = 1;
  string item_key = 2;
  string result_data = 3;
  float confidence = 4;
  string backend_name = 5;
  string validation_target_id = 6; 
}

message PostResultResponse {
  bool accepted = 1;
  string current_status = 2;
}

message UpdateRankRequest {
  string analysis_type = 1;
  string item_key = 2;
  string target_hypothesis_id = 3;
  float new_score = 4;
  string backend_name = 5;
}

message UpdateRankResponse {
  bool accepted = 1;
}
